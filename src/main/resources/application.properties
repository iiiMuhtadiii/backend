spring.application.name=ecommerce

# =========================
# DATABASE
# =========================
spring.datasource.url=${DB_URL:jdbc:mysql://db:3306/ecommerce?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA / HIBERNATE
# =========================
# Make ddl-auto configurable via env var (JPA_DDL_AUTO). Default kept as 'update' for local dev but can be set to 'none' in production.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT
# =========================
# JWT secret MUST be provided via environment variable JWT_SECRET. No insecure default is set here to prevent accidental usage of a weak key.
jwt.secret=${JWT_SECRET:}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.cookie.secure=false

# FRONTEND / CORS
# =========================
# Allowed frontend origin can be configured with FRONTEND_URL (e.g. http://localhost:5173)
# This value is read by CorsConfig and used as the allowed origin for CORS in development.
frontend.url=${FRONTEND_URL:http://localhost:5173}

# =========================
# SWAGGER
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# SERVER
# =========================
server.port=8080

# =========================
# JSON
# =========================
spring.jackson.default-property-inclusion=non_null
